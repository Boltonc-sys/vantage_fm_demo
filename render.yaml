# Use this render.yaml when your GitHub repo has app.py at the TOP level
# (no "vantage-fm-python" subfolder). Example: github.com/Boltonc-sys/vantage_fm_demo
services:
  - type: web
    name: vantage-fm-demo
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1
    envVars:
      - key: DEMO_MODE
        value: "true"
      - key: DEMO_ONLY
        value: "true"
